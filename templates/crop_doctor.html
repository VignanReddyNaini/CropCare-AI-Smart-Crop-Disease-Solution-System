{% extends "base.html" %}
{% block title %}{{ ui.doctor_badge }}{% endblock %}

{% block extra_head %}
<style>
/* (KEEP YOUR EXISTING CSS — NO CHANGES NEEDED) */
</style>
{% endblock %}

{% block content %}
<!-- (KEEP YOUR FULL HTML CONTENT SAME — NO CHANGE ABOVE JS PART) -->
{% endblock %}

{% block extra_js %}
<script>
const LANG = "{{ lang }}";
const CROP_NAME = {{ crop_name | tojson }};

// ------------------ MANDI PRICE ------------------
async function fetchMandiPrice(cropName) {
  if (!cropName) return null;
  try {
    const resp = await fetch('/api/mandi-price?crop=' + encodeURIComponent(cropName.toLowerCase()));
    const d = await resp.json();
    if (d.found && d.modal > 0) return { p: d.modal, u: d.unit || '₹/quintal' };
  } catch(e) {}
  return null;
}

// ------------------ DEMO MODE ------------------
let demoOn = false;

function toggleDemoMode() {
  demoOn = !demoOn;
  document.getElementById('demoCheck').checked = demoOn;
  document.getElementById('demoCrops').classList.toggle('show', demoOn);
  document.getElementById('demoModeInput').value = demoOn ? '1' : '0';
  document.getElementById('uploadZone').style.opacity = demoOn ? '.5' : '1';

  if (!demoOn) {
    document.querySelectorAll('.demo-crop-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('demoCropInput').value = '';
  }
}

function selectDemoCrop(k, btn) {
  document.querySelectorAll('.demo-crop-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('demoCropInput').value = k;

  const m = {
    tomato:{crop:'Tomato',soil:'Loamy',variety:'Hybrid',days:'45'},
    rice:{crop:'Rice',soil:'Clay',variety:'IR-64',days:'30'},
    cotton:{crop:'Cotton',soil:'Black Cotton',variety:'Bt Cotton',days:'60'}
  };

  const d = m[k];
  if (d) {
    document.getElementById('cropInput').value = d.crop;
    document.getElementById('soilInput').value = d.soil;
    document.getElementById('varietyInput').value = d.variety;
    document.getElementById('daysInput').value = d.days;
  }
}

// ------------------ IMAGE PREVIEW ------------------
const fi = document.getElementById('fileInput');

if (fi) {
  fi.addEventListener('change', function() {
    const f = this.files[0];
    if (!f) return;

    const r = new FileReader();
    r.onload = e => {
      const img = document.getElementById('previewImg');
      img.src = e.target.result;
      img.style.display = 'block';

      document.getElementById('uploadIcon').style.display = 'none';
      document.getElementById('uploadZone').classList.add('has-file');
    };
    r.readAsDataURL(f);
  });
}

// ------------------ FORM SUBMIT ------------------
function handleSubmit() {
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('btnLoading').style.display = 'flex';
  document.getElementById('loadingOverlay').classList.add('show');
}

// ------------------ RESULT PARSING ------------------
const raw = document.getElementById('resultRaw');
const rowsEl = document.getElementById('resultRows');

let parsedSev = '';
let parsedDis = '';

if (raw && rowsEl) {
  const text = raw.textContent.trim();

  const sections = [
    {e:'🔍',k:'Disease'},
    {e:'🧪',k:'Cause'},
    {e:'⚠️',k:'Severity'},
    {e:'💊',k:'Treatment'},
    {e:'🌱',k:'Fertilizer'},
    {e:'🛡️',k:'Prevention'},
    {e:'📅',k:'Next Steps'}
  ];

  sections.forEach(sec => {
    const regex = new RegExp(sec.e + "[^\\n]*\\n([\\s\\S]*?)(?=🔍|🧪|⚠️|💊|🌱|🛡️|📅|$)");
    const m = text.match(regex);

    if (!m || !m[1]) return;

    const content = m[1].trim();

    if (sec.e === '🔍') parsedDis = content;
    if (sec.e === '⚠️') parsedSev = content;

    const div = document.createElement('div');
    div.className = 'rr';

    div.innerHTML = `
      <div class="rr-emoji">${sec.e}</div>
      <div>
        <div class="rr-label">${sec.k}</div>
        <div class="rr-text">${content}</div>
      </div>
    `;

    rowsEl.appendChild(div);
  });
}

// ------------------ MANDI FETCH ------------------
(async () => {
  const cn = (CROP_NAME || parsedDis || '').toLowerCase().split(' ')[0];
  const mp = await fetchMandiPrice(cn);

  if (mp) {
    document.getElementById('mandiBlock').style.display = 'flex';
    document.getElementById('mandiCropName').textContent = cn;
    document.getElementById('mandiPrice').textContent = '₹' + mp.p + ' ' + mp.u;
  }
})();

// ------------------ SHARE ------------------
function shareWA(e) {
  e.preventDefault();
  const r = document.getElementById('resultRaw')?.textContent || '';

  window.open(
    'https://wa.me/?text=' +
    encodeURIComponent('🌿 Crop Report\n\n' + r),
    '_blank'
  );
}

// ------------------ COPY ------------------
function copyReport() {
  navigator.clipboard.writeText(
    document.getElementById('resultRaw')?.textContent || ''
  );
}

// ------------------ AUDIO ------------------
const audio = document.getElementById('gttsAudio');
const pb = document.getElementById('playBtn');

function handlePlay() {
  if (!audio) {
    alert('Audio not available');
    return;
  }

  if (audio.paused) {
    audio.play();
    pb.innerHTML = '⏸ Stop';
  } else {
    audio.pause();
    pb.innerHTML = '▶ Listen';
  }
}

if (audio) {
  audio.addEventListener('ended', () => {
    pb.innerHTML = '▶ Listen';
  });
}
</script>
{% endblock %}
